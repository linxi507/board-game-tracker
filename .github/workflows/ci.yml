name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["*"]

# Cancel in-progress runs for the same branch/PR when new commits arrive
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (pytest + migrations)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: board_game_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d board_game_tracker_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # backend expects DATABASE_URL; keep consistent with app config
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/board_game_tracker_test
      JWT_SECRET_KEY: ci-test-secret
      JWT_ALGORITHM: HS256
      CORS_ORIGINS: "*"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          if [ -f backend/requirements-test.txt ]; then pip install -r backend/requirements-test.txt; fi

      - name: Run DB migrations
        working-directory: backend
        run: |
          alembic upgrade head

      - name: Run tests
        run: |
          pytest -q backend/tests

  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      # If your repo doesn't have ESLint configured, this step will fail.
      # Keep it, and if it fails we can either add ESLint config or change to "npm run lint || true" temporarily.
      - name: Lint
        working-directory: frontend
        run: npm run lint

      # If you don't have a dedicated typecheck script, Vite+TS usually supports:
      # - add "typecheck": "tsc -p tsconfig.json --noEmit" in package.json
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Build
        working-directory: frontend
        run: npm run build
